<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Order Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f5f2; /* Soft cream background */
        }
        .coffee-gradient {
            background: linear-gradient(45deg, #4e342e, #8d6e63);
        }
    </style>
</head>
<body>

<section id="order" class="py-5" dir="ltr">
    <div class="container">
        <div class="row align-items-center">
            
            <div class="col-lg-7">
                <div class="card border-0 shadow-lg p-4 p-sm-5" style="border-radius: 20px;">
                    <div class="mb-4 text-center text-lg-start">
                        <h2 class="fw-bold text-dark">Brew Your <span style="color: #6f4e37;">Perfect Cup</span></h2>
                        <p class="text-muted">Freshly roasted beans delivered to your door.</p>
                    </div>

                    <form>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Full Name</label>
                                <input type="text" class="form-control form-control-lg border-0 bg-light" placeholder="Enter your name" style="font-size: 0.9rem;">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Phone Number</label>
                                <input type="tel" class="form-control form-control-lg border-0 bg-light" placeholder="07XXXXXXXX" style="font-size: 0.9rem;">
                            </div>
                        </div>

                       

                        <div class="mb-4">
                            <label class="form-label fw-bold">Delivery Address</label>
                            <textarea class="form-control border-0 bg-light" rows="3" placeholder="Street, Apartment, Office..."></textarea>
                        </div>

                        <div class="d-grid">
                           <button type="button" onclick="showAlert()" class="btn btn-lg text-white fw-bold shadow-sm coffee-gradient" style="border: none; border-radius: 10px; padding: 12px;">
    Order My Favorite ☕
</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-lg-5 mb-4 mb-lg-0 d-none d-lg-block">
                <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&q=80&w=1000" 
                     alt="Fresh Coffee" class="img-fluid shadow" style="border-radius: 20px;">
            </div>

        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


<script>
    function showAlert() {
        alert("Your order has been successfully submitted! Please wait until we contact you.");
    }
</script>
</body>
</html>
