<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rania-Coffee</title>

    <!-- Bootstrap Linkkkk-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* awa size'akani navakana  */
        .navbar-nav  {
            font-size: 20px; 
        }

        .text-white{
            background-color: #493323;
        }
        
        .navbar-brand{
            font-size: 1.6rem;
        }

        /* Mobile: stack text above image */
        @media (max-width: 576px) {
            .row.align-items-center {
                flex-direction: column-reverse;
                text-align: center;
            }

            .navbar-nav .nav-link {
                font-size: 22px; /* even bigger on mobile */
                text-align: center;
            }
        }

    </style>
</head>

<body class="text-white">

    <!-- awa Navbar'a hata line'e 63 -->
    <nav class="navbar navbar-expand-lg navbar-dark py-3 container">
        <a class="navbar-brand fw-bold" href="#">☕ Rania-Coffee</a>

        <!-- awa aw icon'aya ka pshan dada awa maxsadm (☰)-->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu"
            aria-controls="menu" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- awa bashi nav bar'iya ka home page'u awanaya ETC...-->
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="navItem"><a class="nav-link text-white" href="#home">Home</a></li>
                <li class="navItem"><a class="nav-link text-white" href="/about us/aboutUs.html">About</a></li>
                <li class="navItem"><a class="nav-link text-white" href="/menu/menu.html">Menu</a></li>
            </ul>
        </div>
    </nav>

    <!-- awa bashi hero section'akaya -->
    <div class="container vh-100 d-flex align-items-center">
        <div class="row align-items-center">
            <div class="col-md-6">
                
                    <!-- text warning rangakay dakata zard (yellow)-->
                <h5 class="text-warning fw-bold">Best Coffee</h5>
                <h1 class="fw-bold display-5">Make your day great with our special coffee!</h1>
                <p class="text-light "> Welcome to the place where mornings turn into memories and coffee becomes an experience.                </p>
                <div class="mt-3">
                    <a href="/menu/menu.html">
                    <button class="btn btn-warning me-2 ">Order Now</button>
                    </a>
                    <a href="/contact us/ContactUs.html">
                    <button class="btn btn-outline-light ">Contact Us</button>
                    </a>
                </div>
            </div>

            <div class="col-md-6 text-center">
                <img src="coffee cup.png" class="img-fluid" alt="Coffee cup">
            </div>
        </div>
    </div>

    <!-- awa Footer -->
    <footer class="bg-black text-center text-light py-4">
        <div class="container">
            <p class="mb-1 fw-bold">☕ Rania-Coffee</p>
            <p class="text-secondary mb-2">Fresh coffee with ISE Students</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const navLinks = document.querySelectorAll('.navbar-nav .nav-link');
        const menu = document.getElementById('menu');

        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                const bsCollapse = new bootstrap.Collapse(menu, { toggle: false });
                bsCollapse.hide();
            });
        });
    </script>

</body>
</html>
